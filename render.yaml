services:
  - type: web
    name: doriane-world
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn doriane_world.wsgi --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "doriane-world.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://doriane-world.onrender.com"
      - key: SERVE_MEDIA
        value: "True"
      - key: ADMIN_ORDER_EMAIL
        value: "admin@dorianeworld.local"
      - key: DEFAULT_FROM_EMAIL
        value: "Doriane World <no-reply@dorianeworld.local>"
      - key: WHATSAPP_NUMBER
        value: "2250171532149"
      - key: DATABASE_URL
        fromDatabase:
          name: doriane-world-db
          property: connectionString

databases:
  - name: doriane-world-db
    plan: free
    databaseName: doriane_world
    user: doriane_world
